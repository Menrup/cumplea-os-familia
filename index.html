<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🎉 Cumpleaños Mágico Familiar 🎉</title>
    
    <!-- Importación de la tipografía premium Poppins -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #f0f7f9 0%, #e3edf7 100%);
            font-family: 'Poppins', system-ui, sans-serif;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            position: relative;
            z-index: 10;
        }

        .card {
            background: rgba(255, 255, 255, 0.96);
            border-radius: 40px;
            box-shadow: 0 25px 50px rgba(15, 32, 67, 0.06), 0 5px 15px rgba(0, 0, 0, 0.03);
            backdrop-filter: blur(8px);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        .header {
            background: linear-gradient(135deg, #00b4db, #0083b0);
            padding: 40px 20px;
            text-align: center;
            color: white;
        }

        /* Título en Poppins: Recto, imponente y muy elegante */
        .header h1 {
            font-size: 2.1rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 3px 6px rgba(0, 40, 70, 0.15);
        }

        .header p {
            margin-top: 8px;
            font-size: 0.85rem;
            opacity: 0.9;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 700;
        }

        .notification-bar {
            background: #eaf6f9;
            border-bottom: 1px dashed #c3e2ec;
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            color: #005a78;
            font-weight: 600;
        }

        .notification-bar button {
            background: #0083b0;
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 20px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
        }

        .today-section {
            background: linear-gradient(135deg, #eafdff 0%, #dff2f7 100%);
            margin: 24px;
            border-radius: 32px;
            padding: 26px;
            text-align: center;
            border-left: 6px solid #00b4db;
            box-shadow: 0 8px 20px rgba(0, 180, 219, 0.06);
        }

        .today-label {
            font-size: 0.8rem;
            letter-spacing: 3px;
            font-weight: 800;
            color: #008da8;
            text-transform: uppercase;
        }

        .today-name {
            font-size: 2.6rem;
            font-weight: 900;
            color: #003e54; 
            margin: 8px 0;
            letter-spacing: -0.5px;
        }

        .today-extra-text {
            font-size: 1.05rem;
            font-weight: 600;
            color: #4a6b82;
            line-height: 1.6;
        }
        
        .today-extra-text strong {
            font-weight: 800;
            color: #0083b0;
        }

        .upcoming-title {
            font-size: 1.2rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 0 24px 14px 24px;
            padding-bottom: 8px;
            border-bottom: 2px dashed #cfe3eb;
            color: #1f3a52;
        }

        .birthday-list {
            margin: 0 24px 25px 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .birthday-item {
            background: #fbfdfe;
            border-radius: 24px;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #e6eff5;
            transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .birthday-item:hover {
            transform: translateX(4px);
            background: #f5fbfd;
            border-color: #00b4db;
        }

        .birthday-item.is-today-item {
            border-color: #00b4db;
            background: #f0fdfa;
        }

        .name {
            font-weight: 700;
            font-size: 1.15rem;
            color: #1f3a52;
        }

        .date {
            font-size: 0.8rem;
            color: #6988a1;
            margin-top: 3px;
            font-weight: 600;
        }

        .days-badge {
            background: #e6f4f8;
            padding: 6px 14px;
            border-radius: 40px;
            font-weight: 800;
            color: #006b8f;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .birthday-item.is-today-item .days-badge {
            background: linear-gradient(135deg, #00b4db, #0083b0);
            color: white;
            animation: pulse 1s infinite alternate;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.04); }
        }

        .demo-btn {
            background: linear-gradient(135deg, #00cbd6, #009cb8);
            border: none;
            color: white;
            padding: 16px 20px;
            border-radius: 24px;
            font-weight: 800;
            cursor: pointer;
            margin: 0 24px 24px 24px;
            width: calc(100% - 48px);
            font-size: 0.95rem;
            letter-spacing: 1px;
            transition: 0.2s;
            box-shadow: 0 4px 15px rgba(0, 180, 219, 0.2);
            text-transform: uppercase;
        }

        .demo-btn:hover {
            opacity: 0.95;
            box-shadow: 0 6px 20px rgba(0, 180, 219, 0.35);
        }

        .footer {
            text-align: center;
            padding: 20px;
            background: #eaf1f5;
            font-size: 0.75rem;
            color: #617d91;
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        /* Capa de partículas mágicas exclusivas */
        .animation-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1000;
            overflow: hidden;
        }

        .floating-item {
            position: absolute;
            font-size: 2.4rem;
            animation: floatAnim 4.5s ease-out forwards;
            pointer-events: none;
        }

        @keyframes floatAnim {
            0% { transform: translateY(105vh) rotate(0deg) scale(0.7); opacity: 0; }
            15% { opacity: 1; transform: translateY(85vh) rotate(15deg) scale(1.1); }
            85% { opacity: 1; }
            100% { transform: translateY(-10vh) rotate(60deg) scale(0.8); opacity: 0; }
        }

        #confetti-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1001;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <div class="header">
            <h1>🎂 Cumpleaños Familiar 🎈</h1>
            <p>✨ Diseño Elegante y Moderno ✨</p>
        </div>

        <div id="notificationBar" class="notification-bar" style="display: none;">
            <span>🔔 Activar recordatorios en el móvil o PC de la familia</span>
            <button onclick="requestPushPermission()">Activar</button>
        </div>

        <div class="today-section" id="todaySection">
            <div class="today-label">✨ Hoy homenajeamos a ✨</div>
            <div class="today-name" id="todayName">-</div>
            <div id="todayExtra" class="today-extra-text"></div>
        </div>

        <div class="upcoming-title">Próximas Fechas Importantes</div>
        <div class="birthday-list" id="upcomingList"></div>

        <button class="demo-btn" id="demoCelebrationBtn">🎊 ¡PROBAR SORPRESAS COMBINADAS! 🎊</button>
        <div class="footer">
            Generado con Amor Familiar • Cada integrante posee un <strong>efecto visual único</strong> en su día.
        </div>
    </div>
</div>

<div id="animationLayer" class="animation-layer"></div>
<canvas id="confetti-canvas"></canvas>

<script>
    // =========================================================================
    //  LISTA CON EFECTOS TEMÁTICOS PERSONALIZADOS Y EXCLUSIVOS POR INTEGRANTE
    // =========================================================================
    const birthdays = [
        { nombre: "Jesús", mes: 5, dia: 11, año: 1985, efecto: "galaxia" },
        { nombre: "Wily", mes: 6, dia: 6, año: null, efecto: "carnaval" },
        { nombre: "Vidal", mes: 7, dia: 2, año: null, efecto: "criollo" },
        { nombre: "Mary", mes: 7, dia: 24, año: null, efecto: "bosque" },
        { nombre: "Delia", mes: 8, dia: 27, año: null, efecto: "carnaval" },
        { nombre: "Rebeca", mes: 8, dia: 28, año: null, efecto: "oceano" },
        { nombre: "Moisés", mes: 8, dia: 30, año: null, efecto: "oceano" },
        { nombre: "Gregoria", mes: 10, dia: 28, año: null, efecto: "criollo" },
        { nombre: "Raquel", mes: 11, dia: 11, año: null, efecto: "galaxia" },
        { nombre: "Ely", mes: 11, dia: 24, año: null, efecto: "primavera" },
        { nombre: "Deisy", mes: 11, dia: 30, año: null, efecto: "bosque" }
    ];

    const ef_colors = {
        oceano: ["#00d2ff", "#00a8cc", "#a2e8f5", "#ffffff", "#74b9ff"],
        bosque: ["#55efc4", "#81ecec", "#ffeaa7", "#fab1a0", "#74b9ff"],
        criollo: ["#ff7675", "#fdcb6e", "#e17055", "#d63031", "#e84393"],
        galaxia: ["#a29bfe", "#74b9ff", "#ffeaa7", "#fd79a8", "#ffffff"],
        carnaval: ["#fffa65", "#ffaf40", "#ff4d4d", "#ff4b4b", "#18dcff"],
        primavera: ["#ff9ff3", "#feca57", "#ff6b6b", "#48dbfb", "#ffccd5"]
    };

    const ef_emojis = {
        oceano: ["🫧", "🌊", "🐬", "🐚", "💎"],
        bosque: ["🦋", "🍃", "🌸", "🦉", "🍄"],
        criollo: ["🪅", "🎸", "🍬", "🍭", "🎶"],
        galaxia: ["✨", "⭐", "🌟", "🌌", "🌙"],
        carnaval: ["🎈", "🎭", "🎉", "🎊", "🥂"],
        primavera: ["🌸", "🌹", "🌷", "💖", "🕊️"]
    };

    function isToday(mesReal, dia) {
        const hoy = new Date();
        return (hoy.getMonth() + 1) === mesReal && hoy.getDate() === dia;
    }

    function daysUntil(mesReal, dia) {
        const hoy = new Date();
        const hoyLimpio = new Date(hoy.getFullYear(), hoy.getMonth(), hoy.getDate());
        let fechaCumple = new Date(hoy.getFullYear(), mesReal - 1, dia);
        if (fechaCumple < hoyLimpio) fechaCumple = new Date(hoy.getFullYear() + 1, mesReal - 1, dia);
        return Math.ceil((fechaCumple - hoyLimpio) / (1000 * 60 * 60 * 24));
    }

    function checkPushStatus() {
        if ('Notification' in window && Notification.permission === 'default') {
            document.getElementById('notificationBar').style.display = 'flex';
        }
    }

    function requestPushPermission() {
        if ('Notification' in window) {
            Notification.requestPermission().then(permission => {
                if (permission === 'granted') {
                    document.getElementById('notificationBar').style.display = 'none';
                    new Notification("🎉 ¡Felicidades!", { body: "El sistema de alertas familiares está activo." });
                }
            });
        }
    }

    function updateTodaySection() {
        const hoyCumples = birthdays.filter(b => isToday(b.mes, b.dia));
        const todayNameDiv = document.getElementById("todayName");
        const todayExtra = document.getElementById("todayExtra");

        if (hoyCumples.length > 0) {
            const nombres = hoyCumples.map(b => b.nombre).join(" y ");
            todayNameDiv.innerHTML = nombres;
            let edadHtml = "";
            hoyCumples.forEach(b => {
                if (b.año) {
                    const edad = new Date().getFullYear() - b.año;
                    edadHtml += `¡Brindemos por sus <strong>${edad} años</strong> de vida!<br>`;
                }
            });
            todayExtra.innerHTML = edadHtml + "🎈 Hoy la magia florece de forma exclusiva para ti. 🎈";
            startMagicalCelebration(hoyCumples[0].efecto);
        } else {
            const proximos = [...birthdays].map(b => ({ ...b, days: daysUntil(b.mes, b.dia) })).sort((a,b)=>a.days-b.days);
            const next = proximos[0];
            if (next) {
                todayNameDiv.innerHTML = `${next.nombre}`;
                todayExtra.innerHTML = `El próximo gran festejo llegará en <strong>${next.days} día${next.days !== 1 ? 's' : ''}</strong>. ⏳`;
            }
        }
    }

    function renderUpcoming() {
        const upcoming = [...birthdays]
            .map(b => ({ ...b, days: daysUntil(b.mes, b.dia), isToday: isToday(b.mes, b.dia) }))
            .sort((a, b) => a.days - b.days);
            
        const container = document.getElementById("upcomingList");
        container.innerHTML = "";
        
        upcoming.forEach(b => {
            const fechaStr = new Date(2000, b.mes - 1, b.dia).toLocaleDateString('es-ES', { day: 'numeric', month: 'long' });
            let badgeText = b.isToday ? "🎈 HOY 🎈" : (b.days === 1 ? "🎉 Mañana" : `en ${b.days} días`);
            const itemClass = b.isToday ? 'birthday-item is-today-item' : 'birthday-item';
            const ageDisplay = b.isToday && b.año ? `(${new Date().getFullYear() - b.año} años)` : '';

            container.innerHTML += `
                <div class="${itemClass}">
                    <div>
                        <div class="name">${b.nombre} <span style="font-size:0.9rem; color:#00b4db; font-weight: 600;">${ageDisplay}</span></div>
                        <div class="date">📅 ${fechaStr}</div>
                    </div>
                    <div class="days-badge"><strong>${badgeText}</strong></div>
                </div>
            `;
        });
    }

    let activeMagic = false;

    function stopMagic() {
        activeMagic = false;
        document.getElementById("animationLayer").innerHTML = "";
        const canvas = document.getElementById("confetti-canvas");
        const ctx = canvas.getContext("2d");
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (window.confettiInterval) clearInterval(window.confettiInterval);
    }

    function startMagicalCelebration(tipoEfecto) {
        if (activeMagic) return;
        activeMagic = true;
        stopMagic();
        activeMagic = true;

        const estilo = tipoEfecto || "carnaval";
        const canvas = document.getElementById("confetti-canvas");
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const ctx = canvas.getContext("2d");
        let particles = [];
        const colors = ef_colors[estilo];

        for (let i = 0; i < 140; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height - canvas.height,
                size: Math.random() * 8 + 5,
                color: colors[Math.floor(Math.random() * colors.length)],
                speedY: Math.random() * 4 + 3,
                speedX: (Math.random() - 0.5) * 2,
                rotation: Math.random() * 360
            });
        }

        function drawConfetti() {
            if (!activeMagic) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            let stillActive = false;
            for (let p of particles) {
                p.y += p.speedY; p.x += p.speedX; p.rotation += 2;
                if (p.y < canvas.height + 50) stillActive = true;
                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate(p.rotation * Math.PI / 180);
                ctx.fillStyle = p.color;
                ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
                ctx.restore();
            }
            if (stillActive) requestAnimationFrame(drawConfetti);
        }
        drawConfetti();

        const layer = document.getElementById("animationLayer");
        const itemsDisponibles = ef_emojis[estilo];

        function createFloatingItem() {
            if (!activeMagic) return;
            const div = document.createElement("div");
            div.className = "floating-item";
            div.innerText = itemsDisponibles[Math.floor(Math.random() * itemsDisponibles.length)];
            div.style.left = Math.random() * 90 + 5 + "%";
            div.style.fontSize = (Math.random() * 1.3 + 1.9) + "rem";
            div.style.animationDuration = (Math.random() * 2 + 3) + "s";
            layer.appendChild(div);
            setTimeout(() => div.remove(), 4500);
        }

        const interval = setInterval(createFloatingItem, 220);
        window.confettiInterval = interval;

        setTimeout(() => {
            clearInterval(interval);
            setTimeout(() => { if (activeMagic) stopMagic(); }, 4500);
        }, 10000);
    }

    document.getElementById("demoCelebrationBtn").addEventListener("click", () => {
        const todosLosEfectos = ["oceano", "bosque", "criollo", "galaxia", "carnaval", "primavera"];
        const efectoAleatorio = todosLosEfectos[Math.floor(Math.random() * todosLosEfectos.length)];
        startMagicalCelebration(efectoAleatorio);
        
        const toast = document.createElement("div");
        toast.innerHTML = `🎭 Probando: <strong>Efecto ${efectoAleatorio.toUpperCase()}</strong> 💎`;
        toast.style.position = "fixed";
        toast.style.bottom = "40px";
        toast.style.left = "50%";
        toast.style.transform = "translateX(-50%)";
        toast.style.backgroundColor = "#0083b0";
        toast.style.color = "white";
        toast.style.padding = "12px 24px";
        toast.style.borderRadius = "50px";
        toast.style.fontWeight = "bold";
        toast.style.zIndex = "2000";
        toast.style.fontSize = "0.9rem";
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2500);
    });

    window.addEventListener("resize", () => {
        const canvas = document.getElementById("confetti-canvas");
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    });

    checkPushStatus();
    updateTodaySection();
    renderUpcoming();
</script>
</body>
</html>
